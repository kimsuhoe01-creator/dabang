name: CUKCUK menu sync

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

concurrency:
  group: cukcuk-menu-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Check out menu repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Start from the latest main branch
        shell: bash
        run: git pull --rebase origin main

      - name: Import customer menu from CUKCUK
        env:
          CUKCUK_SECRET_KEY: ${{ secrets.CUKCUK_SECRET_KEY }}
        shell: bash
        run: |
          if [ -z "$CUKCUK_SECRET_KEY" ]; then
            echo "CUKCUK_SECRET_KEY is not configured yet."
            exit 0
          fi

          response_file="$(mktemp)"
          status="$(curl --silent --show-error \
            --output "$response_file" \
            --write-out "%{http_code}" \
            --request POST \
            --header "Content-Type: application/json" \
            --header "X-CUKCUK-Secret: $CUKCUK_SECRET_KEY" \
            "https://dabang-tablet-admin.kimsuhoe.chatgpt.site/api/cukcuk/sync")"

          cat "$response_file"
          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "CUKCUK sync failed with HTTP $status."
            exit 1
          fi

      - name: Publish latest menu data for GitHub Pages
        env:
          CUKCUK_COMPANY_CODE: ${{ secrets.CUKCUK_COMPANY_CODE }}
          CUKCUK_ACCESS_TOKEN: ${{ secrets.CUKCUK_ACCESS_TOKEN }}
          CUKCUK_BRANCH_ID: ${{ secrets.CUKCUK_BRANCH_ID }}
        shell: bash
        run: |
          mkdir -p data
          curl --silent --show-error --fail \
            --output data/cukcuk-menu.json \
            "https://dabang-tablet-admin.kimsuhoe.chatgpt.site/api/cukcuk/menu"
          jq -e '.ok == true and .synced == true' data/cukcuk-menu.json >/dev/null

          # The branch ID is stable for DABANG CHICKEN and was returned by the
          # authenticated CUKCUK sync response. A secret can still override it.
          CUKCUK_BRANCH_ID="${CUKCUK_BRANCH_ID:-430a00af-29db-4f30-b8f8-e87bdb793ab0}"
          table_synced=false
          if [ -z "$CUKCUK_COMPANY_CODE" ] || [ -z "$CUKCUK_ACCESS_TOKEN" ]; then
            echo "::warning::Table sync skipped. Configure CUKCUK_COMPANY_CODE and CUKCUK_ACCESS_TOKEN."
          else
            table_file="$(mktemp)"
            curl --silent --show-error --fail-with-body \
              --header "Authorization: Bearer $CUKCUK_ACCESS_TOKEN" \
              --header "CompanyCode: $CUKCUK_COMPANY_CODE" \
              --header "Content-Type: application/json" \
              --output "$table_file" \
              "https://graphapi.cukcuk.vn/api/v1/tables/$CUKCUK_BRANCH_ID"
            jq -e '.Success == true and .Data.ListTable != null and (.Data.ListTable | type == "array" and length > 0)' "$table_file" >/dev/null
            mv "$table_file" data/cukcuk-tables.json
            table_synced=true
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/cukcuk-menu.json
          if [ -f data/cukcuk-tables.json ]; then
            git add data/cukcuk-tables.json
          fi
          if git diff --cached --quiet; then
            echo "Published data is already up to date."
            exit 0
          fi
          if [ "$table_synced" = true ]; then
            git commit -m "Update CUKCUK menu and table data"
          else
            git commit -m "Update CUKCUK menu data"
          fi
          git push
