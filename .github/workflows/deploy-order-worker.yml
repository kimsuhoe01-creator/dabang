name: Deploy CUKCUK order worker

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "cloudflare-order-worker/**"
      - ".github/workflows/deploy-order-worker.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Test order worker
        working-directory: cloudflare-order-worker
        run: npm test
      - name: Deploy order worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: cloudflare-order-worker
          wranglerVersion: "4.112.0"
          command: deploy
      - name: Upload CUKCUK secret
        working-directory: cloudflare-order-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CUKCUK_SECRET_KEY: ${{ secrets.CUKCUK_SECRET_KEY }}
        shell: bash
        run: printf '%s' "$CUKCUK_SECRET_KEY" | npx --yes wrangler@4.112.0 secret put CUKCUK_SECRET_KEY
